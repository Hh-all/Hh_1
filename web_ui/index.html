<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企业智能搜索代理</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ============================================================
   全局 - 暖色调主题
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #faf7f2;
  --bg-secondary: #f5f0e8;
  --bg-card: #ffffff;
  --bg-card-hover: #fefaf5;
  --bg-input: #fdfaf6;
  --border: #e8e0d5;
  --border-focus: #e07b39;
  --text-primary: #3d3027;
  --text-secondary: #8d7b6e;
  --text-muted: #b8a99c;
  --accent: #e07b39;
  --accent-hover: #c96a2e;
  --accent-light: #f0a060;
  --accent-bg: rgba(224,123,57,0.06);
  --green: #4a9e6b;
  --green-bg: #f2f8f3;
  --green-border: #c5e0cd;
  --user-bg: #fff3e8;
  --user-border: #f0c8a0;
  --amber: #d4943a;
  --amber-bg: #fef9f0;
  --amber-border: #e8d5b0;
  --indigo: #7c6db8;
  --indigo-bg: #f8f6fd;
  --indigo-border: #d8d0f0;
  --red: #d44a3a;
  --radius: 12px;
  --radius-lg: 14px;
  --shadow-sm: 0 1px 3px rgba(61,48,39,0.06);
  --shadow-md: 0 4px 16px rgba(61,48,39,0.08);
}

body {
  font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", system-ui, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

/* ---- 顶部栏 ---- */
.header {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 10px 24px; display: flex; align-items: center; gap: 10px;
  flex-shrink: 0; user-select: none; box-shadow: var(--shadow-sm);
}
.header .logo { display: flex; align-items: center; gap: 8px; }
.header .logo-icon {
  width: 30px; height: 30px; border-radius: 8px;
  background: linear-gradient(135deg, #e07b39, #f0a060);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 900; color: #fff;
}
.header h1 { font-size: 14px; font-weight: 700; color: var(--text-primary); white-space: nowrap; }
.header .version {
  font-size: 10px; color: var(--text-muted);
  background: var(--bg-secondary); padding: 2px 8px; border-radius: 4px;
}
.spacer { flex: 1; }
.header-actions { display: flex; align-items: center; gap: 8px; }
.header-btn {
  background: transparent; color: var(--text-secondary); border: 1px solid transparent;
  border-radius: 8px; padding: 5px 12px; font-size: 12px; cursor: pointer;
  font-family: inherit; transition: all 0.2s;
}
.header-btn:hover { color: var(--text-primary); border-color: var(--border); background: var(--bg-secondary); }

.status-indicator { display: flex; align-items: center; gap: 6px; margin-left: 4px; }
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #4a9e6b; flex-shrink: 0; transition: all 0.3s;
  box-shadow: 0 0 6px rgba(74,158,107,0.3);
}
.status-dot.searching { background: #e07b39; box-shadow: 0 0 8px rgba(224,123,57,0.4); animation: pulse 0.8s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:0.5;} 50%{opacity:1;} }
.status-label { font-size: 12px; color: #4a9e6b; font-weight: 500; transition: color 0.3s; white-space: nowrap; }
.status-label.searching { color: #e07b39; }

/* ---- 聊天区 ---- */
.chat-container { flex: 1; overflow: hidden; position: relative; }
.chat-area {
  height: 100%; overflow-y: auto; padding: 24px 20px;
  display: flex; flex-direction: column; gap: 12px;
}
.chat-area::-webkit-scrollbar { width: 5px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: #d8cfc2; border-radius: 3px; }
.chat-area::-webkit-scrollbar-thumb:hover { background: #c0b5a5; }

.scroll-bottom-btn {
  position: sticky; bottom: 16px; left: 50%; transform: translateX(-50%);
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-secondary); font-size: 16px; cursor: pointer;
  display: none; align-items: center; justify-content: center;
  z-index: 10; transition: all 0.2s; margin-top: -56px;
  box-shadow: var(--shadow-md);
}
.scroll-bottom-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.scroll-bottom-btn.visible { display: flex; }

/* ---- 欢迎页 ---- */
.welcome { text-align: center; padding: 48px 16px 28px; user-select: none; }
.welcome h2 { font-size: 22px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
.welcome .sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 36px; }
.source-cards { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 28px; }
.source-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px 16px; width: 140px; text-align: center; cursor: default;
  transition: all 0.25s; box-shadow: var(--shadow-sm);
}
.source-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: #e0c8a8; }
.source-card .card-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 900; margin-bottom: 10px;
}
.source-card .card-title { font-size: 12px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.source-card .card-desc { font-size: 10px; color: var(--text-secondary); line-height: 1.5; }
.quick-asks { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
.quick-btn {
  background: var(--bg-card); color: var(--accent);
  border: 1px solid var(--border); border-radius: 24px;
  padding: 8px 20px; font-size: 13px; cursor: pointer;
  font-family: inherit; transition: all 0.2s; box-shadow: var(--shadow-sm);
}
.quick-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ---- 消息气泡 ---- */
.message { display: flex; flex-direction: column; max-width: 80%; animation: msgIn 0.35s ease; }
@keyframes msgIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }

.msg-user     { align-self: flex-end; }
.msg-answer   { align-self: flex-start; min-width: 200px; }
.msg-tool     { align-self: flex-start; margin-left: 20px; max-width: 74%; }
.msg-thinking { align-self: flex-start; margin-left: 32px; max-width: 70%; }
.msg-system   { align-self: center; text-align: center; max-width: 90%; }
.msg-error    { align-self: center; text-align: center; max-width: 85%; }

.bubble { border-radius: var(--radius-lg); padding: 13px 16px; position: relative; }

.msg-user .bubble {
  background: var(--user-bg); border: 1px solid var(--user-border);
  border-bottom-right-radius: 4px; box-shadow: var(--shadow-sm);
}
.msg-answer .bubble {
  background: var(--green-bg); border: 1px solid var(--green-border);
  border-bottom-left-radius: 4px; box-shadow: var(--shadow-sm);
}
.msg-tool .bubble {
  background: var(--amber-bg); border: 1px solid var(--amber-border);
  border-radius: var(--radius); border-bottom-left-radius: 4px; cursor: pointer;
}
.msg-thinking .bubble {
  background: var(--indigo-bg); border: 1px dashed var(--indigo-border);
  border-radius: var(--radius); border-bottom-left-radius: 4px;
}
.msg-system .bubble { background: transparent; border: none; padding: 4px 8px; }
.msg-error .bubble {
  background: #fef5f5; border: 1px solid #f0c8c4; border-radius: var(--radius); padding: 10px 16px;
}

.msg-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
  font-size: 11px; font-weight: 600; user-select: none;
}
.msg-user .msg-header    { color: var(--accent); flex-direction: row-reverse; }
.msg-answer .msg-header  { color: var(--green); }
.msg-tool .msg-header    { color: var(--amber); }
.msg-thinking .msg-header{ color: var(--indigo); }
.msg-system .msg-header  { display: none; }
.msg-error .msg-header   { color: var(--red); }
.msg-time { font-size: 10px; color: var(--text-muted); font-weight: 400; }

.msg-content { font-size: 14px; line-height: 1.75; word-wrap: break-word; }
.msg-system .msg-content { font-size: 13px; color: var(--text-secondary); }
.msg-error .msg-content { color: #a04040; font-size: 13px; }

/* Markdown 渲染 */
.msg-content h1,.msg-content h2,.msg-content h3,.msg-content h4 { margin: 14px 0 8px; color: var(--text-primary); }
.msg-content h2 { font-size: 16px; border-bottom: 2px solid var(--green-border); padding-bottom: 5px; }
.msg-content h3 { font-size: 15px; }
.msg-content p { margin-bottom: 10px; }
.msg-content p:last-child { margin-bottom: 0; }
.msg-content ul,.msg-content ol { padding-left: 22px; margin: 8px 0; }
.msg-content li { margin-bottom: 4px; }
.msg-content strong { color: #2d2420; }
.msg-content code {
  background: #fdf3ea; padding: 2px 6px; border-radius: 4px;
  font-size: 12px; font-family: "Cascadia Code","Fira Code",Consolas,monospace;
  color: #c96a2e;
}
.msg-content pre {
  background: #faf6f0; padding: 12px 16px; border-radius: 10px;
  overflow-x: auto; margin: 10px 0; font-size: 12px; line-height: 1.6;
  border: 1px solid var(--border);
}
.msg-content pre code { background: none; padding: 0; font-size: 12px; color: var(--text-primary); }
.msg-content table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13px; }
.msg-content th,.msg-content td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
.msg-content th { background: #fefaf5; font-weight: 600; color: var(--text-primary); }
.msg-content blockquote {
  border-left: 3px solid var(--accent); padding: 6px 14px; margin: 10px 0;
  color: var(--text-secondary); background: var(--accent-bg); border-radius: 0 8px 8px 0;
}

/* 工具消息折叠 */
.tool-collapsed .tool-body { display: none; }
.tool-toggle {
  font-size: 11px; color: var(--amber); cursor: pointer;
  margin-top: 8px; user-select: none; display: flex; align-items: center; gap: 4px;
  font-weight: 500;
}
.tool-toggle:hover { color: #b87a2a; }
.tool-toggle .arrow { transition: transform 0.2s; display: inline-block; font-size: 9px; }
.tool-collapsed .tool-toggle .arrow { transform: rotate(-90deg); }
.tool-summary { font-size: 13px; color: var(--text-secondary); display: none; }
.tool-collapsed .tool-summary { display: block; }
.tool-collapsed .tool-header-row { display: none; }

/* 复制按钮 */
.copy-btn {
  opacity: 0; background: transparent; border: 1px solid transparent;
  color: var(--text-muted); font-size: 11px; cursor: pointer;
  padding: 2px 10px; border-radius: 6px; margin-left: 4px;
  font-family: inherit; transition: all 0.2s; white-space: nowrap;
}
.msg-header:hover .copy-btn { opacity: 1; }
.copy-btn:hover { color: var(--accent); border-color: var(--border); background: var(--bg-card); }
.copy-btn.copied { color: #4a9e6b; border-color: #4a9e6b; background: #f2f8f3; }

/* 搜索步骤组 */
.search-step {
  display: flex; flex-direction: column; gap: 4px;
  border-left: 2px solid #e8d5b0; margin: 4px 0 4px 16px; padding-left: 14px;
  animation: msgIn 0.3s ease;
}
.search-step .step-number {
  font-size: 10px; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 4px; font-weight: 600;
}

/* 加载指示器 */
.loading-block {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 18px; font-size: 13px; color: var(--text-secondary);
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border); align-self: flex-start;
  box-shadow: var(--shadow-sm);
}
.loading-block .dots { display: flex; gap: 4px; }
.loading-block .dots span {
  width: 7px; height: 7px; background: var(--accent-light);
  border-radius: 50%; animation: dotBounce 1.2s ease-in-out infinite;
}
.loading-block .dots span:nth-child(2){animation-delay:0.2s;}
.loading-block .dots span:nth-child(3){animation-delay:0.4s;}
@keyframes dotBounce {0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}

/* 会话统计 */
.session-stats {
  align-self: center; text-align: center; font-size: 12px; font-weight: 500;
  color: var(--text-secondary); padding: 8px 18px;
  background: var(--bg-card); border-radius: 20px;
  border: 1px solid var(--border); margin-top: 6px;
  animation: msgIn 0.4s ease; box-shadow: var(--shadow-sm);
}

/* ---- 输入区 ---- */
.input-area {
  background: var(--bg-card); border-top: 1px solid var(--border);
  padding: 16px 20px 14px; flex-shrink: 0; box-shadow: 0 -2px 8px rgba(61,48,39,0.04);
}
.input-row { display: flex; gap: 10px; align-items: flex-end; }
#queryInput {
  flex: 1; background: var(--bg-input);
  border: 1px solid var(--border); border-radius: 12px;
  padding: 12px 16px; color: var(--text-primary); font-size: 14px; font-family: inherit;
  resize: none; min-height: 46px; max-height: 120px; line-height: 1.6;
  outline: none; transition: all 0.2s;
}
#queryInput:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(224,123,57,0.1); }
#queryInput::placeholder { color: var(--text-muted); }
#queryInput:disabled { opacity: 0.5; background: var(--bg-secondary); }

#sendBtn {
  background: var(--accent); color: #fff; border: none; border-radius: 12px;
  padding: 12px 26px; font-weight: 600; font-size: 14px; cursor: pointer;
  font-family: inherit; white-space: nowrap; transition: all 0.2s;
  min-width: 72px; box-shadow: 0 2px 8px rgba(224,123,57,0.25);
}
#sendBtn:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(224,123,57,0.35); }
#sendBtn:active { transform: translateY(0); }
#sendBtn:disabled { background: #d8cfc2; color: #b8a99c; cursor: not-allowed; transform: none; box-shadow: none; }

#stopBtn {
  background: var(--red); color: #fff; border: none; border-radius: 12px;
  padding: 12px 26px; font-weight: 600; font-size: 14px; cursor: pointer;
  font-family: inherit; white-space: nowrap; display: none; transition: all 0.2s;
  min-width: 72px;
}
#stopBtn:hover { background: #c0392f; }
.hint-row { display: flex; justify-content: flex-end; margin-top: 6px; }
.hint-row span { font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>

<!-- 顶部栏 -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">S</div>
    <h1>企业智能搜索代理</h1>
  </div>
  <span class="version">v1.0</span>
  <span class="spacer"></span>
  <div class="header-actions">
    <button class="header-btn" onclick="clearChat()" title="清空对话">清空</button>
  </div>
  <div class="status-indicator">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-label" id="statusLabel">就绪</span>
  </div>
</div>

<!-- 聊天区 -->
<div class="chat-container">
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcomeBlock">
      <h2>欢迎使用企业智能搜索代理</h2>
      <p class="sub">基于 Doubao 大模型的多源智能搜索 -- 一站式获取企业信息</p>
      <div class="source-cards">
        <div class="source-card">
          <div class="card-icon" style="background:rgba(74,158,107,0.1);color:#4a9e6b">DB</div>
          <div class="card-title">本地数据库</div>
          <div class="card-desc">员工、项目、销售等结构化数据</div>
        </div>
        <div class="source-card">
          <div class="card-icon" style="background:rgba(224,123,57,0.1);color:#e07b39">VEC</div>
          <div class="card-title">向量语义搜索</div>
          <div class="card-desc">文档和知识的语义匹配检索</div>
        </div>
        <div class="source-card">
          <div class="card-icon" style="background:rgba(212,148,58,0.1);color:#d4943a">KW</div>
          <div class="card-title">关键词搜索</div>
          <div class="card-desc">全文关键词精确检索</div>
        </div>
        <div class="source-card">
          <div class="card-icon" style="background:rgba(70,130,160,0.1);color:#4682a0">REPO</div>
          <div class="card-title">代码仓库</div>
          <div class="card-desc">源代码和配置文件搜索</div>
        </div>
        <div class="source-card">
          <div class="card-icon" style="background:rgba(180,90,70,0.1);color:#b45a46">ENT</div>
          <div class="card-title">企业系统</div>
          <div class="card-desc">HR、CRM、ERP、知识库</div>
        </div>
      </div>
      <div class="quick-asks">
        <button class="quick-btn" onclick="quickAsk('公司有多少员工？')">公司有多少员工？</button>
        <button class="quick-btn" onclick="quickAsk('最近的销售趋势如何？')">最近的销售趋势如何？</button>
        <button class="quick-btn" onclick="quickAsk('项目管理有哪些功能？')">项目管理有哪些功能？</button>
      </div>
    </div>
  </div>
  <button class="scroll-bottom-btn" id="scrollBottomBtn" onclick="scrollToBottom()" title="回到底部">&#8595;</button>
</div>

<!-- 输入区 -->
<div class="input-area">
  <div class="input-row">
    <textarea id="queryInput" placeholder="输入问题，AI 将自主决策搜索策略..." rows="1"></textarea>
    <button id="sendBtn" onclick="sendQuery()">发送</button>
    <button id="stopBtn" onclick="stopSearch()">停止</button>
  </div>
  <div class="hint-row"><span>Enter 发送  |  Shift+Enter 换行</span></div>
</div>

<script>
let isSearching = false;
let abortController = null;
let currentStepBlock = null;
let stepNumber = 0;
let shouldAutoScroll = true;

const chatArea = document.getElementById('chatArea');
const queryInput = document.getElementById('queryInput');
const sendBtn = document.getElementById('sendBtn');
const stopBtn = document.getElementById('stopBtn');
const statusDot = document.getElementById('statusDot');
const statusLabel = document.getElementById('statusLabel');
const scrollBottomBtn = document.getElementById('scrollBottomBtn');

queryInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
});
queryInput.addEventListener('input', () => {
  queryInput.style.height = 'auto';
  queryInput.style.height = Math.min(queryInput.scrollHeight, 120) + 'px';
});

chatArea.addEventListener('scroll', () => {
  const atBottom = chatArea.scrollHeight - chatArea.scrollTop - chatArea.clientHeight < 60;
  shouldAutoScroll = atBottom;
  scrollBottomBtn.classList.toggle('visible', !atBottom && chatArea.scrollHeight > chatArea.clientHeight + 200);
});

function quickAsk(text) {
  queryInput.value = text; queryInput.style.height = 'auto';
  queryInput.style.height = Math.min(queryInput.scrollHeight, 120) + 'px'; queryInput.focus();
}

function clearChat() {
  chatArea.innerHTML = `<div class="welcome" id="welcomeBlock">
    <h2>欢迎使用企业智能搜索代理</h2>
    <p class="sub">基于 Doubao 大模型的多源智能搜索 -- 一站式获取企业信息</p>
    <div class="source-cards">
      <div class="source-card"><div class="card-icon" style="background:rgba(74,158,107,0.1);color:#4a9e6b">DB</div><div class="card-title">本地数据库</div><div class="card-desc">员工、项目、销售等结构化数据</div></div>
      <div class="source-card"><div class="card-icon" style="background:rgba(224,123,57,0.1);color:#e07b39">VEC</div><div class="card-title">向量语义搜索</div><div class="card-desc">文档和知识的语义匹配检索</div></div>
      <div class="source-card"><div class="card-icon" style="background:rgba(212,148,58,0.1);color:#d4943a">KW</div><div class="card-title">关键词搜索</div><div class="card-desc">全文关键词精确检索</div></div>
      <div class="source-card"><div class="card-icon" style="background:rgba(70,130,160,0.1);color:#4682a0">REPO</div><div class="card-title">代码仓库</div><div class="card-desc">源代码和配置文件搜索</div></div>
      <div class="source-card"><div class="card-icon" style="background:rgba(180,90,70,0.1);color:#b45a46">ENT</div><div class="card-title">企业系统</div><div class="card-desc">HR、CRM、ERP、知识库</div></div>
    </div>
    <div class="quick-asks">
      <button class="quick-btn" onclick="quickAsk('公司有多少员工？')">公司有多少员工？</button>
      <button class="quick-btn" onclick="quickAsk('最近的销售趋势如何？')">最近的销售趋势如何？</button>
      <button class="quick-btn" onclick="quickAsk('项目管理有哪些功能？')">项目管理有哪些功能？</button>
    </div></div>`;
  stepNumber = 0; scrollBottomBtn.classList.remove('visible');
}

function sendQuery() {
  const query = queryInput.value.trim();
  if (!query || isSearching) return;
  const welcome = document.getElementById('welcomeBlock');
  if (welcome) welcome.remove();
  addMessage('user', query);
  queryInput.value = ''; queryInput.style.height = 'auto';
  setSearchingState(true); stepNumber = 0; currentStepBlock = null;

  const loadingEl = addLoading();
  abortController = new AbortController();

  fetch('/api/chat', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query }), signal: abortController.signal,
  }).then(response => {
    if (!response.ok) return response.json().then(err => { throw new Error(err.error || '请求失败'); });
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    function read() {
      reader.read().then(({ done, value }) => {
        if (value) buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n'); buffer = lines.pop() || '';
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try { handleEvent(JSON.parse(line.slice(6)), loadingEl); } catch(e){}
          }
        }
        if (!done) { read(); } else {
          if (buffer.trim() && buffer.trim().startsWith('data: ')) {
            try { handleEvent(JSON.parse(buffer.trim().slice(6)), loadingEl); } catch(e){}
          }
          finalizeStepBlock();
          removeLoading(document.getElementById('loadingBlock'));
          setSearchingState(false);
          updateStatus('就绪');
        }
      }).catch(() => {
        finalizeStepBlock();
        removeLoading(document.getElementById('loadingBlock'));
        setSearchingState(false);
        updateStatus('就绪');
      });
    }
    read();
  }).catch(err => {
    if (err.name !== 'AbortError') {
      removeLoading(loadingEl);
      addMessage('error', '连接失败: ' + err.message);
      setSearchingState(false);
    }
  });
}

function stopSearch() {
  if (abortController) { abortController.abort(); abortController = null; }
  removeLoading(document.getElementById('loadingBlock'));
  addMessage('system', '搜索已停止');
  setSearchingState(false);
}

function handleEvent(event, loadingEl) {
  const { type, data } = event;
  switch (type) {
    case 'status': removeLoading(loadingEl); break;
    case 'thinking': removeLoading(loadingEl); ensureStepBlock(); addThinking(data.text); break;
    case 'tool_call': removeLoading(loadingEl); ensureStepBlock(); addToolCall(data.tool, data.query); break;
    case 'tool_result': updateToolResult(data.tool, data.preview); break;
    case 'iteration': updateStatus('第 ' + data.current + '/' + data.maximum + ' 轮搜索'); break;
    case 'answer': removeLoading(loadingEl); finalizeStepBlock(); addAnswer(data.text); break;
    case 'done': removeLoading(loadingEl); finalizeStepBlock(); addSessionStats(data.stats); setSearchingState(false); updateStatus('就绪'); break;
    case 'error': removeLoading(loadingEl); finalizeStepBlock(); addMessage('error', data.text); setSearchingState(false); updateStatus('就绪'); break;
  }
}

function ensureStepBlock() {
  if (!currentStepBlock) {
    stepNumber++;
    currentStepBlock = document.createElement('div');
    currentStepBlock.className = 'search-step';
    currentStepBlock.innerHTML = '<div class="step-number">第 ' + stepNumber + ' 步</div>';
    chatArea.appendChild(currentStepBlock);
    autoScroll();
  }
}

function finalizeStepBlock() { currentStepBlock = null; }

function addThinking(text) {
  const div = document.createElement('div');
  div.className = 'message msg-thinking';
  div.innerHTML = buildBubble('thinking', esc(text));
  currentStepBlock.appendChild(div); autoScroll();
}

function addToolCall(toolName, query) {
  const nameMap = {
    'search_local_database': '本地数据库',
    'search_vector_database': '向量语义搜索',
    'search_keywords': '关键词搜索',
    'search_code_repository': '代码仓库',
    'query_enterprise_system': '企业系统',
  };
  const display = nameMap[toolName] || toolName;
  const div = document.createElement('div');
  div.className = 'message msg-tool';
  div.innerHTML = '<div class="bubble">'
    + '<div class="msg-header"><span>工具调用</span><span class="msg-time">' + now() + '</span>'
    + '<button class="copy-btn" onclick="copyBubbleContent(this)" title="复制">复制</button></div>'
    + '<div class="msg-content">'
    + '<div class="tool-header-row"><strong>[' + display + ']</strong> 查询: <em>' + esc(query) + '</em></div>'
    + '<div class="tool-body"><div class="tool-result-placeholder" style="color:var(--text-muted);font-size:13px;margin-top:8px;">搜索中...</div></div>'
    + '</div>'
    + '<div class="tool-summary"><strong>[' + display + ']</strong> <em>' + esc(query) + '</em></div>'
    + '<div class="tool-toggle" onclick="toggleToolMsg(this.parentElement.parentElement)"><span class="arrow">&#9660;</span> 展开详情</div>'
    + '</div>';
  currentStepBlock.appendChild(div); autoScroll();
}

function updateToolResult(toolName, preview) {
  if (!currentStepBlock) return;
  const toolMsgs = currentStepBlock.querySelectorAll('.msg-tool');
  const last = toolMsgs[toolMsgs.length - 1];
  if (!last) return;
  const ph = last.querySelector('.tool-result-placeholder');
  if (ph) ph.innerHTML = '<div style="font-size:12px;color:var(--text-secondary);margin-top:8px;max-height:200px;overflow-y:auto;white-space:pre-wrap;font-family:Consolas,monospace;background:#fefbf7;padding:8px 10px;border-radius:6px;">' + esc(preview) + '</div>';
}

function toggleToolMsg(msgEl) {
  const bubble = msgEl.querySelector('.bubble');
  bubble.classList.toggle('tool-collapsed');
  const toggle = bubble.querySelector('.tool-toggle');
  bubble.classList.contains('tool-collapsed')
    ? toggle.innerHTML = '<span class="arrow">&#9654;</span> 展开详情'
    : toggle.innerHTML = '<span class="arrow">&#9660;</span> 收起详情';
}

function addAnswer(text) {
  const div = document.createElement('div');
  div.className = 'message msg-answer';
  let rendered;
  try { marked.setOptions({ breaks: true, gfm: true }); rendered = marked.parse(text); }
  catch(e) { rendered = esc(text); }
  div.innerHTML = '<div class="bubble">'
    + '<div class="msg-header"><span>回答</span><span class="msg-time">' + now() + '</span>'
    + '<button class="copy-btn" onclick="copyBubbleContent(this)" title="复制">复制</button></div>'
    + '<div class="msg-content">' + rendered + '</div></div>';
  chatArea.appendChild(div); autoScroll();
}

function addMessage(type, text) {
  const div = document.createElement('div');
  div.className = 'message msg-' + type;
  const showHeader = type !== 'system';
  div.innerHTML = buildBubble(type, esc(text), showHeader, type === 'user');
  chatArea.appendChild(div); autoScroll();
}

function buildBubble(type, content, showHeader, showCopy) {
  const labels = { user: '你', answer: '回答', thinking: '思考', error: '错误' };
  let h = '';
  if (showHeader) {
    const c = showCopy ? '<button class="copy-btn" onclick="copyBubbleContent(this)" title="复制">复制</button>' : '';
    h = '<div class="msg-header"><span>' + (labels[type]||'') + '</span><span class="msg-time">' + now() + '</span>' + c + '</div>';
  }
  return '<div class="bubble">' + h + '<div class="msg-content">' + content + '</div></div>';
}

function addSessionStats(statsText) {
  if (!statsText) return;
  const tm = statsText.match(/耗时[：:]\s*([\d.]+)\s*秒/);
  const it = statsText.match(/(\d+)\s*轮/);
  let s = '搜索完成';
  if (tm) s += '  |  ' + tm[1] + 's';
  if (it) s += '  |  ' + it[1] + ' 轮';
  const div = document.createElement('div');
  div.className = 'session-stats'; div.textContent = s;
  chatArea.appendChild(div); autoScroll();
}

function addLoading() {
  const div = document.createElement('div');
  div.className = 'loading-block'; div.id = 'loadingBlock';
  div.innerHTML = '<span>AI 正在分析问题</span><div class="dots"><span></span><span></span><span></span></div>';
  chatArea.appendChild(div); autoScroll(); return div;
}
function removeLoading(el) { if (el && el.parentNode) el.remove(); }

function copyBubbleContent(btn) {
  const content = btn.closest('.bubble').querySelector('.msg-content');
  navigator.clipboard.writeText(content ? content.textContent : '').then(() => {
    btn.textContent = '已复制'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {});
}

function setSearchingState(s) {
  isSearching = s;
  sendBtn.disabled = s; sendBtn.style.display = s ? 'none' : '';
  stopBtn.style.display = s ? '' : 'none';
  queryInput.disabled = s;
  if (s) { statusDot.classList.add('searching'); statusLabel.classList.add('searching'); updateStatus('搜索中'); }
  else { statusDot.classList.remove('searching'); statusLabel.classList.remove('searching'); updateStatus('就绪'); }
}

function updateStatus(t) { statusLabel.textContent = t; }

function autoScroll() {
  if (shouldAutoScroll) requestAnimationFrame(() => { chatArea.scrollTop = chatArea.scrollHeight; });
}
function scrollToBottom() { shouldAutoScroll = true; chatArea.scrollTop = chatArea.scrollHeight; scrollBottomBtn.classList.remove('visible'); }

function now() { return new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit', second:'2-digit' }); }
function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
</script>
</body>
</html>
